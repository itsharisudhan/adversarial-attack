services:
  - type: redis
    name: redis-cache
    plan: free # Use Render's free tier
    ipAllowList: [] # Allow internal access only

  - type: web
    name: adversarial-detection
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis-cache
          property: connectionString
