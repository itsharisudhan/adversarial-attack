apiVersion: apps/v1
kind: Deployment
metadata:
  name: adversarial-detection-web
  labels:
    app: adversarial-detection
spec:
  replicas: 3
  selector:
    matchLabels:
      app: adversarial-detection
  template:
    metadata:
      labels:
        app: adversarial-detection
    spec:
      containers:
      - name: web
        image: adversarial-detection:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        env:
        - name: PORT
          value: "5000"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: SUPABASE_URL
          value: "https://your-project.supabase.co"
        - name: SUPABASE_SECRET_KEY
          value: "your-service-role-key"
        - name: SUPABASE_HISTORY_TABLE
          value: "analysis_history"
        livenessProbe:
          httpGet:
            path: /api/stats
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/stats
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5
